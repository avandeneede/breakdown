<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Répartition">
<title>Répartition</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23007aff'/><g fill='white' transform='translate(32 32)'><path d='M0 -18 A18 18 0 0 1 17.1 -5.6 L0 0 Z'/><path d='M17.1 -5.6 A18 18 0 0 1 -10.6 14.6 L0 0 Z' opacity='0.72'/><path d='M-10.6 14.6 A18 18 0 0 1 0 -18 L0 0 Z' opacity='0.88'/></g></svg>">
<style>
  :root {
    color-scheme: light dark;
    --bg: #f2f2f7;
    --bg-elevated: #ffffff;
    --card: #ffffff;
    --text: #000000;
    --text-2: rgba(60,60,67,0.85);
    --muted: #8e8e93;
    --separator: rgba(60,60,67,0.16);
    --accent: #007aff;
    --success: #34c759;
    --warning: #ff9500;
    --danger: #ff3b30;
    --fill: rgba(118,118,128,0.12);
    --fill-2: rgba(118,118,128,0.08);
    --fill-3: rgba(118,118,128,0.20);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --bg-elevated: #1c1c1e;
      --card: #1c1c1e;
      --text: #ffffff;
      --text-2: rgba(235,235,245,0.85);
      --muted: #8e8e93;
      --separator: rgba(84,84,88,0.60);
      --accent: #0a84ff;
      --success: #30d158;
      --warning: #ff9f0a;
      --danger: #ff453a;
      --fill: rgba(118,118,128,0.24);
      --fill-2: rgba(118,118,128,0.18);
      --fill-3: rgba(118,118,128,0.36);
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 17px/1.35 -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro", "Segoe UI", Roboto, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    min-height: 100vh;
    overscroll-behavior-y: contain;
  }

  .wrap { max-width: 560px; margin: 0 auto; padding: 8px 16px 48px; }

  .nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 4px 16px;
  }
  .nav .title { font-size: 34px; font-weight: 700; letter-spacing: -0.035em; }
  .nav .profile {
    background: none; border: none; color: var(--accent);
    font-size: 17px; font-weight: 400; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 8px;
    font-family: inherit;
  }
  .nav .profile:active { opacity: 0.6; }

  .hero {
    background: var(--card);
    border-radius: 16px;
    padding: 20px 20px 16px;
    margin-bottom: 28px;
  }
  .hero-label {
    font-size: 13px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    font-weight: 500; margin-bottom: 6px;
  }
  .hero-amount {
    display: flex; align-items: baseline; gap: 6px;
    font-size: 40px; font-weight: 700; letter-spacing: -0.03em;
    line-height: 1.1;
  }
  .hero-amount .cur {
    color: var(--muted); font-weight: 500; cursor: pointer;
    min-width: 0.6em; text-align: center;
    user-select: none;
  }
  .hero-amount input {
    all: unset; flex: 1; min-width: 0;
    font: inherit; color: inherit;
    font-variant-numeric: tabular-nums;
  }
  .hero-amount input::placeholder { color: var(--muted); opacity: 0.6; }

  .progress {
    height: 6px; background: var(--fill);
    border-radius: 3px; overflow: hidden;
    margin-top: 18px;
  }
  .progress > div {
    height: 100%; background: var(--accent);
    border-radius: 3px;
    transition: width .3s cubic-bezier(.4,0,.2,1), background .2s;
  }

  .stats {
    display: flex; gap: 14px; margin-top: 16px;
    padding-top: 14px; border-top: 0.5px solid var(--separator);
  }
  .stat { flex: 1; min-width: 0; }
  .stat-label {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 500;
  }
  .stat-value {
    font-size: 17px; font-weight: 600;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .stat.danger .stat-value { color: var(--danger); }
  .stat.success .stat-value { color: var(--success); }

  .section-head {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 500;
    padding: 4px 16px 8px;
  }
  .section-head button {
    background: none; border: none; color: var(--accent);
    font-size: 22px; line-height: 1; padding: 4px 8px;
    cursor: pointer; border-radius: 50%;
    font-family: inherit;
  }
  .section-head button:active { background: var(--fill); }

  .group {
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 28px;
  }

  .row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    position: relative;
    cursor: pointer;
    background: var(--card);
    transition: background .15s;
  }
  .row::after {
    content: ''; position: absolute;
    left: 16px; right: 0; bottom: 0;
    border-bottom: 0.5px solid var(--separator);
  }
  .row:last-child::after { display: none; }
  .row:active { background: var(--fill-2); }

  .row-rank {
    width: 22px; text-align: center;
    font-size: 13px; font-weight: 600;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .icon-tile {
    width: 34px; height: 34px; border-radius: 9px;
    display: grid; place-items: center;
    flex-shrink: 0;
    background: var(--tile-bg, #8e8e93);
    color: white;
  }
  .icon-tile svg {
    width: 20px; height: 20px;
    fill: none; stroke: currentColor;
    stroke-width: 1.75;
    stroke-linecap: round; stroke-linejoin: round;
  }

  .row-main { flex: 1; min-width: 0; }
  .row-title {
    font-size: 16px; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .row-sub {
    font-size: 13px; color: var(--muted);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .row-right { text-align: right; flex-shrink: 0; min-width: 0; }
  .row-amount {
    font-size: 16px; font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .row-amount.short { color: var(--warning); }
  .row-amount.zero { color: var(--muted); }
  .row-meta {
    font-size: 12px; color: var(--muted);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .row-meta.short { color: var(--warning); }
  .chevron {
    color: var(--muted); opacity: 0.45;
    font-size: 18px; line-height: 1; margin-left: 4px;
  }

  .row-action-icon {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--fill); color: var(--text-2);
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .row-action-icon svg {
    width: 16px; height: 16px;
    fill: none; stroke: currentColor;
    stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
  }

  .group-empty {
    padding: 28px 20px; text-align: center;
    color: var(--muted); font-size: 15px;
  }

  .input {
    width: 100%;
    background: var(--fill); border: none;
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text); font-size: 17px;
    outline: none;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    transition: background .15s;
  }
  .input:focus { background: var(--fill-2); }
  .input::placeholder { color: var(--muted); opacity: 0.7; }

  .btn {
    font-family: inherit;
    font-size: 17px; font-weight: 500;
    cursor: pointer;
    background: var(--fill); color: var(--text);
    border: none; border-radius: 12px;
    padding: 12px 18px;
    transition: background .15s, transform .05s, opacity .15s;
    text-align: center;
  }
  .btn:active { transform: scale(0.98); }
  .btn:hover { background: var(--fill-2); }
  .btn.primary { background: var(--accent); color: white; font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.danger { color: var(--danger); }
  .btn.danger.primary { background: var(--danger); color: white; }
  .btn.ghost { background: transparent; }
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { flex: 1; }

  .segmented {
    display: inline-flex; background: var(--fill);
    border-radius: 9px; padding: 2px; gap: 2px;
  }
  .segmented button {
    background: transparent; border: none; cursor: pointer;
    padding: 7px 14px; font: inherit; font-size: 14px; font-weight: 500;
    border-radius: 7px; color: var(--text-2);
    min-width: 52px;
    font-family: inherit;
  }
  .segmented button.active {
    background: var(--bg-elevated); color: var(--text);
    box-shadow: 0 2px 6px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.04);
    font-weight: 600;
  }
  @media (prefers-color-scheme: dark) {
    .segmented button.active {
      background: #48484a;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
  }

  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0);
    z-index: 100;
    pointer-events: none;
    transition: background .25s;
  }
  .sheet-backdrop.open {
    background: rgba(0,0,0,0.4);
    pointer-events: auto;
  }
  #dialogSheet { z-index: 200; }
  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--bg);
    border-radius: 14px 14px 0 0;
    padding: 8px 20px calc(env(safe-area-inset-bottom) + 24px);
    max-width: 560px; margin: 0 auto;
    max-height: 90vh; overflow-y: auto;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,.28,1);
  }
  .sheet-backdrop.open .sheet { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 5px;
    background: var(--muted); opacity: 0.45;
    border-radius: 3px;
    margin: 6px auto 16px;
  }
  .sheet h2 {
    font-size: 20px; font-weight: 600;
    margin: 0 0 18px;
    letter-spacing: -0.02em;
  }
  .sheet h3 {
    font-size: 15px; font-weight: 600;
    margin: 22px 0 6px;
    letter-spacing: -0.01em;
  }
  .sheet p { margin: 0 0 10px; color: var(--text-2); font-size: 15px; line-height: 1.45; }
  .sheet ol, .sheet ul { padding-left: 22px; color: var(--text-2); font-size: 15px; line-height: 1.5; }
  .sheet li { margin-bottom: 6px; }
  .sheet code {
    font-family: "SF Mono", Menlo, monospace; font-size: 13px;
    background: var(--fill); padding: 1px 6px; border-radius: 5px;
  }
  .callout {
    background: var(--fill);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px; color: var(--text-2);
    margin: 12px 0;
  }
  .field-label {
    font-size: 13px; color: var(--muted);
    font-weight: 500; margin: 18px 0 8px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .field-label:first-child { margin-top: 0; }

  .icon-picker-btn {
    width: 48px; height: 48px;
    border-radius: 11px;
    border: none;
    display: grid; place-items: center;
    flex-shrink: 0;
    cursor: pointer;
    background: var(--tile-bg, #007aff);
    color: white;
    transition: transform .1s;
  }
  .icon-picker-btn:active { transform: scale(0.94); }
  .icon-picker-btn svg {
    width: 26px; height: 26px;
    fill: none; stroke: currentColor;
    stroke-width: 1.75;
    stroke-linecap: round; stroke-linejoin: round;
  }

  .icon-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px; margin-top: 12px;
    padding: 8px; background: var(--fill); border-radius: 12px;
  }
  .icon-grid button {
    background: transparent; border: none;
    padding: 10px 0;
    border-radius: 10px; cursor: pointer;
    display: grid; place-items: center;
    color: var(--text-2);
    transition: background .15s, transform .1s;
    font-family: inherit;
  }
  .icon-grid button:hover { background: var(--fill-3); }
  .icon-grid button:active { transform: scale(0.9); }
  .icon-grid button.active {
    background: var(--fill-3);
    color: var(--text);
  }
  .icon-grid svg {
    width: 22px; height: 22px;
    fill: none; stroke: currentColor;
    stroke-width: 1.75;
    stroke-linecap: round; stroke-linejoin: round;
  }

  .color-row {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 6px; margin-top: 12px;
  }
  .color-dot {
    aspect-ratio: 1;
    border-radius: 50%;
    cursor: pointer; border: none;
    position: relative;
    padding: 0;
    background: var(--color);
    transition: transform .1s;
  }
  .color-dot:active { transform: scale(0.9); }
  .color-dot.active::after {
    content: ''; position: absolute; inset: -3px;
    border-radius: 50%;
    border: 2px solid var(--text);
    pointer-events: none;
  }

  .reorder {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .reorder .btn { flex: 1; font-size: 15px; padding: 10px; }

  .muted { color: var(--muted); font-size: 13px; }
  .hide { display: none !important; }

  .check {
    color: var(--accent); font-size: 18px; font-weight: 600;
    width: 18px; text-align: center;
  }

  .footer {
    text-align: center; color: var(--muted);
    font-size: 12px; padding: 16px 0;
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="nav">
    <div class="title" id="appTitle">Répartition</div>
    <button class="profile" id="profileBtn">
      <span id="profileName">—</span>
      <svg width="11" height="11" viewBox="0 0 12 12" aria-hidden="true">
        <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="hero">
    <div class="hero-label" id="amountLabel">—</div>
    <div class="hero-amount">
      <span class="cur" id="curSym">€</span>
      <input id="budget" type="number" inputmode="decimal" step="0.01" placeholder="0">
    </div>
    <div class="progress"><div id="progressBar" style="width:0%"></div></div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label" id="allocatedLabel">—</div>
        <div class="stat-value" id="allocatedVal">—</div>
      </div>
      <div class="stat" id="remainingStat">
        <div class="stat-label" id="freeLabel">—</div>
        <div class="stat-value" id="remainingVal">—</div>
      </div>
      <div class="stat hide" id="shortStat">
        <div class="stat-label" id="shortLabel">—</div>
        <div class="stat-value" id="shortVal">—</div>
      </div>
    </div>
  </div>

  <div class="section-head">
    <span id="keysSection">—</span>
    <button id="addKeyBtn" title="+">＋</button>
  </div>
  <div class="group" id="keysList"></div>

  <div class="section-head"><span id="dataSection">—</span></div>
  <div class="group">
    <div class="row" id="guideRow">
      <div class="row-main"><div class="row-title" id="guideRowTitle">—</div><div class="row-sub" id="guideRowSub">—</div></div>
      <span class="chevron">›</span>
    </div>
    <div class="row" id="exportRow">
      <div class="row-main"><div class="row-title" id="exportRowTitle">—</div><div class="row-sub" id="exportRowSub">—</div></div>
      <span class="chevron">›</span>
    </div>
    <div class="row" id="importRow">
      <div class="row-main"><div class="row-title" id="importRowTitle">—</div><div class="row-sub" id="importRowSub">—</div></div>
      <span class="chevron">›</span>
    </div>
    <div class="row" id="langRow">
      <div class="row-main"><div class="row-title" id="langRowTitle">—</div><div class="row-sub" id="langRowSub">—</div></div>
      <span class="chevron">›</span>
    </div>
  </div>
  <input id="importFile" type="file" accept="application/json" class="hide">

  <div class="footer" id="footerText">—</div>
</div>

<!-- Profile sheet -->
<div class="sheet-backdrop" id="profileSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="profileSheetTitle">—</h2>
    <div class="group" id="profileList"></div>
    <button class="btn primary" type="button" id="newProfileBtn" style="width:100%">—</button>
  </div>
</div>

<!-- Key sheet -->
<div class="sheet-backdrop" id="keySheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="keySheetTitle">—</h2>

    <div style="display:flex;gap:12px;align-items:center">
      <button class="icon-picker-btn" id="keyIconBtn" type="button"></button>
      <input type="text" class="input" id="keyName" placeholder="—" autocomplete="off">
    </div>

    <div class="color-row" id="colorRow"></div>
    <div class="icon-grid hide" id="iconGrid"></div>

    <div class="field-label" id="typeValueLabel">—</div>
    <div style="display:flex;gap:10px;align-items:center">
      <input type="number" inputmode="decimal" step="0.01" class="input" id="keyValue" placeholder="0" style="flex:1">
      <div class="segmented">
        <button type="button" id="typeAbs" class="active" data-type="amount">€</button>
        <button type="button" id="typePct" data-type="percent">%</button>
      </div>
    </div>
    <div id="percentModeWrap" class="hide" style="margin-top:10px">
      <div class="segmented" style="display:flex;width:100%">
        <button type="button" id="pctTotal" class="active" style="flex:1" data-pct="total">—</button>
        <button type="button" id="pctRest" style="flex:1" data-pct="rest">—</button>
      </div>
    </div>
    <div class="muted" id="valueHint" style="margin-top:6px"></div>

    <div id="reorderSection" class="hide">
      <div class="field-label" id="priorityLabel">—</div>
      <div class="reorder">
        <button class="btn" type="button" id="moveUp">—</button>
        <button class="btn" type="button" id="moveDown">—</button>
      </div>
      <div class="muted" id="priorityHint" style="margin-top:8px">—</div>
    </div>

    <div class="btn-row" style="margin-top:24px">
      <button class="btn danger" type="button" id="keyDelete">—</button>
      <button class="btn primary" type="button" id="keySave" style="flex:2">—</button>
    </div>
  </div>
</div>

<!-- Guide sheet -->
<div class="sheet-backdrop" id="guideSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="guideSheetTitle">—</h2>
    <div id="guideContent"></div>
    <button class="btn primary" type="button" id="guideClose" style="width:100%;margin-top:20px">—</button>
  </div>
</div>

<!-- Language sheet -->
<div class="sheet-backdrop" id="langSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="langSheetTitle">—</h2>
    <div class="group" id="langList"></div>
  </div>
</div>

<!-- Dialog sheet -->
<div class="sheet-backdrop" id="dialogSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="dialogTitle"></h2>
    <p id="dialogMessage" class="hide"></p>
    <input type="text" class="input hide" id="dialogInput" autocomplete="off">
    <div class="btn-row" style="margin-top:16px">
      <button class="btn" type="button" id="dialogCancel">—</button>
      <button class="btn primary" type="button" id="dialogOk">—</button>
    </div>
  </div>
</div>

<script>
(() => {
  'use strict';

  // ============ Translations ============
  const T = {
    en: {
      htmlLang: 'en', appLocale: 'en-US',
      title: 'Breakdown',
      amountLabel: 'Amount to break down',
      allocated: 'Allocated',
      free: 'Free',
      short: 'Short',
      keysSection: 'Distribution keys',
      dataSection: 'Data',
      guideTitle: 'Quick guide',
      guideSub: 'How to use, export, import',
      exportTitle: 'Export my profiles',
      exportSub: 'Download a JSON file',
      importTitle: 'Import a file',
      importSub: 'Restore or transfer from another device',
      langRowTitle: 'Language',
      footer: 'Data stored locally on this device.',
      profilesTitle: 'Profiles',
      newProfile: 'New profile',

      delete: 'Delete',

      newKey: 'New key',
      editKey: 'Edit key',

      moveUp: '↑ Move up',
      moveDown: '↓ Move down',
      priorityHint: 'Keys at the top are served first if the amount is insufficient.',
      save: 'Save',
      noKeys: 'No keys. Tap ＋ to add one.',
      fixed: 'fixed',
      pctOfTotal: 'of total',
      pctOfRest: 'of remaining',
      requested: 'requested',
      hintPctTotal: '≈ {amount} {currency} of {total}',
      hintPctRest: '≈ {amount} {currency} of the remaining pool',
      hintAmt: '≈ {pct} % of the amount',

  function normalizeType(t) {
    if (t === 'percent-rest' || t === 'percent-total' || t === 'amount') return t;
    if (t === 'percent' || t === 'pct') return 'percent-total';
    return 'amount';
  }

  function migrate(raw) {
    if (!raw) return null;
    let s;
    try { s = typeof raw === 'string' ? JSON.parse(raw) : raw; } catch { return null; }
    if (!s || !s.profiles) return null;
    if (s.v === 5) return s;

    Object.values(s.profiles).forEach(p => {
      let source = p.keys;
      if (p.envelopes && !source) {
        source = p.envelopes.map(e => ({
          id: uid(), emoji: e.emoji || '💰', name: e.name || '',
          type: e.mode === 'pct' ? 'percent-total' : 'amount',
          value: +e.alloc || 0,
        }));
      }
      if (p.budget !== undefined && p.amount === undefined) { p.amount = p.budget; delete p.budget; }
      if (p.mode && source && source.length && !('type' in (source[0] || {}))) {
        const t = p.mode === 'pct' ? 'percent-total' : 'amount';
        source = source.map(k => ({ ...k, type: t, value: +k.value || 0 }));
      }
      delete p.mode; delete p.envelopes;
      p.currency = p.currency || '€';
      p.keys = (source || []).map(k => {
        let icon = k.icon, color = k.color;
        if (!icon || !color) {
          const [ic, co] = emojiToIcon(k.emoji || '💰');
          icon = icon || ic; color = color || co;
        }
        return {
          id: k.id || uid(),
          icon, color,
          name: k.name || '',
          type: normalizeType(k.type),
          value: +k.value || 0,
        };
      });
    });
    if (!s.profiles[s.currentId]) s.currentId = Object.keys(s.profiles)[0] || 'p_default';
    if (!s.lang || !T[s.lang]) s.lang = detectLang();
    s.v = 5;
    return s;
  }

  let state;
  try {
    let raw = localStorage.getItem(LS_KEY);
    if (!raw) {
      for (const k of LS_OLD) { const x = localStorage.getItem(k); if (x) { raw = x; break; } }
    }
    state = migrate(raw) || defaultState();
  } catch { state = defaultState(); }

  const save = () => { state.v = 5; try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch {} };
  const current = () => {
    if (!state.profiles[state.currentId]) state.currentId = Object.keys(state.profiles)[0];
    return state.profiles[state.currentId];
  };

  // ============ i18n helpers ============
  const tr = () => T[state.lang] || T.en;
  function t(key, vars) {
    const parts = key.split('.');
    let v = tr();
    for (const p of parts) v = v && v[p];
    if (v == null) {
      let fb = T.en;
      for (const p of parts) fb = fb && fb[p];
      v = fb ?? key;
    }
    if (typeof v === 'string' && vars) {
      v = v.replace(/\{(\w+)\}/g, (_, k) => vars[k] ?? '');
    }
    return v;
  }
  const fmt = n => {
    const v = Math.round((+n || 0) * 100) / 100;
    return v.toLocaleString(tr().appLocale, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  };
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  // ============ Dialog (replaces prompt/confirm/alert) ============
  function dialog({ title, message, input, placeholder, defaultValue, okText, cancelText, okStyle = 'primary', showCancel = true }) {
    return new Promise(resolve => {
      $('#dialogTitle').textContent = title || '';
      const msgEl = $('#dialogMessage');
      msgEl.textContent = message || '';
      msgEl.classList.toggle('hide', !message);
      const inputEl = $('#dialogInput');
      inputEl.classList.toggle('hide', !input);
      inputEl.value = defaultValue || '';
      inputEl.placeholder = placeholder || '';
      const cancelBtn = $('#dialogCancel');
      cancelBtn.classList.toggle('hide', !showCancel);
      cancelBtn.textContent = cancelText || t('dlgCancel');
      const okBtn = $('#dialogOk');
      okBtn.textContent = okText || t('dlgOk');
      okBtn.className = 'btn ' + okStyle;

      const cleanup = () => { okBtn.onclick = null; cancelBtn.onclick = null; inputEl.onkeydown = null; };
      const ok = () => { cleanup(); closeSheet('dialogSheet'); resolve(input ? inputEl.value.trim() : true); };
      const cancel = () => { cleanup(); closeSheet('dialogSheet'); resolve(input ? null : false); };
      okBtn.onclick = ok;
      cancelBtn.onclick = cancel;
      if (input) inputEl.onkeydown = e => { if (e.key === 'Enter') ok(); };
      openSheet('dialogSheet');
      if (input) setTimeout(() => { inputEl.focus(); inputEl.select(); }, 320);
    });
  }

  // ============ Compute ============
  function compute(p) {
    const total = +p.amount || 0;
    let pool = total;
    const results = p.keys.map(k => {
      let requested;
      if (k.type === 'percent-total')      requested = total * (+k.value || 0) / 100;
      else if (k.type === 'percent-rest')  requested = pool * (+k.value || 0) / 100;
      else                                 requested = (+k.value || 0);
      const actual = Math.max(0, Math.min(requested, pool));
      pool -= actual;
      return { key: k, requested, actual, short: requested - actual };
    });
    const allocated = total - pool;
    const totalRequested = results.reduce((s, r) => s + r.requested, 0);
    const totalShort = Math.max(0, totalRequested - total);
    return { total, allocated, pool, results, totalShort };
  }

  // Compute pool state at a given key position (before that key runs)
  function poolAtPosition(p, pos) {
    const total = +p.amount || 0;
    let pool = total;
    for (let i = 0; i < Math.min(pos, p.keys.length); i++) {
      const k = p.keys[i];
      let r;
      if (k.type === 'percent-total')      r = total * (+k.value || 0) / 100;
      else if (k.type === 'percent-rest')  r = pool * (+k.value || 0) / 100;
      else                                 r = (+k.value || 0);
      pool -= Math.max(0, Math.min(r, pool));
    }
    return Math.max(0, pool);
  }

  // ============ Render ============
  function renderHero() {
    const p = current();
    const c = compute(p);
    $('#curSym').textContent = p.currency;
    if (document.activeElement !== $('#budget')) $('#budget').value = p.amount || '';
    $('#allocatedVal').textContent = fmt(c.allocated);
    $('#remainingVal').textContent = fmt(c.pool);
    $('#shortVal').textContent = fmt(c.totalShort);
    $('#remainingStat').classList.toggle('success', c.total > 0 && c.pool < 0.005 && c.totalShort < 0.005);
    $('#shortStat').classList.toggle('hide', c.totalShort < 0.005);
    $('#shortStat').classList.toggle('danger', c.totalShort >= 0.005);
    const pct = c.total > 0 ? Math.min(100, c.allocated / c.total * 100) : 0;
    const bar = $('#progressBar');
    bar.style.width = pct + '%';
    bar.style.background = c.totalShort >= 0.005
      ? 'var(--warning)'
      : (c.total > 0 && c.pool < 0.01 ? 'var(--success)' : 'var(--accent)');
    $('#profileName').textContent = p.name;
  }

  function settingText(k, p) {
    if (k.type === 'percent-total') return `${fmt(k.value)} % · ${t('pctOfTotal')}`;
    if (k.type === 'percent-rest')  return `${fmt(k.value)} % · ${t('pctOfRest')}`;

  function getType() {
    if ($('#typeAbs').classList.contains('active')) return 'amount';

  function updateValueHint() {
    const p = current();
    const type = getType();
    const v = +$('#keyValue').value || 0;
    const hint = $('#valueHint');
    if (type === 'percent-total') {
      hint.textContent = p.amount > 0
        ? t('hintPctTotal', { amount: fmt(p.amount * v / 100), currency: p.currency, total: fmt(p.amount) })
        : t('hintSetAmount');
    } else if (type === 'percent-rest') {
      const pos = editingId ? p.keys.findIndex(x => x.id === editingId) : p.keys.length;
      const basePool = poolAtPosition(p, pos < 0 ? p.keys.length : pos);
      hint.textContent = p.amount > 0
        ? t('hintPctRest', { amount: fmt(basePool * v / 100), currency: p.currency })
        : t('hintSetAmount');
    } else {
      hint.textContent = p.amount > 0 ? t('hintAmt', { pct: fmt(v / p.amount * 100) }) : '';
    }
  }

    const p = current();
    p.keys = p.keys.filter(x => x.id !== editingId);

  });

  function moveKey(delta) {
    if (!editingId) return;
    const p = current();
    const i = p.keys.findIndex(x => x.id === editingId);
    const j = i + delta;
    if (i < 0 || j < 0 || j >= p.keys.length) return;
    [p.keys[i], p.keys[j]] = [p.keys[j], p.keys[i]];
    save(); renderAll();
  }

  // ============ Data actions ============
  $('#exportRow').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `repartition-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);

  $('#importRow').addEventListener('click', () => $('#importFile').click());
  $('#importFile').addEventListener('change', async e => {
    const f = e.target.files[0]; e.target.value = '';
    if (!f) return;
    const r = new FileReader();
    r.onload = async () => {
      try {
        const s = migrate(r.result);
        if (!s || !s.profiles) throw new Error('invalid');
        const ok = await dialog({
          title: t('dlgImport'), message: t('dlgImportMsg'),
          okText: t('dlgImportBtn'), okStyle: 'danger primary',
        });
        if (!ok) return;
        state = s;
        if (!state.lang || !T[state.lang]) state.lang = detectLang();
        save(); applyStaticTexts(); renderAll();
      } catch (err) {
        await dialog({ title: t('dlgImportFailed'), message: err.message || '', showCancel: false });
      }
    };
    r.readAsText(f);
  });

  $('#guideRow').addEventListener('click', () => openSheet('guideSheet'));
  $('#guideClose').addEventListener('click', () => closeSheet('guideSheet'));

  // ============ Language sheet ============
  function renderLangList() {
    const list = $('#langList');
    list.innerHTML = '';
    LANGS.forEach(lg => {
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <div class="row-main"><div class="row-title">${LANG_NAMES[lg]}</div></div>
        ${lg === state.lang ? '<span class="check">✓</span>' : ''}`;
      row.addEventListener('click', () => {
        state.lang = lg; save();
        applyStaticTexts(); renderAll();
        renderLangList();
        closeSheet('langSheet');
      });
      list.appendChild(row);
    });
  }
  $('#langRow').addEventListener('click', () => { renderLangList(); openSheet('langSheet'); });

  // ============ Boot ============
  applyStaticTexts();
  renderAll();
})();
</script>
</body>
</html>
